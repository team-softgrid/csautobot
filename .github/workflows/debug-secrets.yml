name: Debug Secrets Test

on:
  workflow_dispatch:

jobs:
  debug:
    runs-on: ubuntu-latest

    steps:
      - name: Check secrets availability
        run: |
          echo "=== Secrets Length Check ==="
          echo "SERVER_HOST length: ${#SERVER_HOST}"
          echo "SERVER_USER length: ${#SERVER_USER}"
          echo "SERVER_PASSWORD length: ${#SERVER_PASSWORD}"
          echo "OPENAI_API_KEY length: ${#OPENAI_API_KEY}"
          echo "ANTHROPIC_API_KEY length: ${#ANTHROPIC_API_KEY}"
          echo "GOOGLE_API_KEY length: ${#GOOGLE_API_KEY}"
          echo "TAVILY_API_KEY length: ${#TAVILY_API_KEY}"
          echo "LANGSMITH_API_KEY length: ${#LANGSMITH_API_KEY}"
        env:
          SERVER_HOST: ${{ secrets.SERVER_HOST }}
          SERVER_USER: ${{ secrets.SERVER_USER }}
          SERVER_PASSWORD: ${{ secrets.SERVER_PASSWORD }}
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          GOOGLE_API_KEY: ${{ secrets.GOOGLE_API_KEY }}
          TAVILY_API_KEY: ${{ secrets.TAVILY_API_KEY }}
          LANGSMITH_API_KEY: ${{ secrets.LANGSMITH_API_KEY }}

      - name: Test SSH connection
        uses: appleboy/ssh-action@master
        with:
          host: ${{ secrets.SERVER_HOST }}
          port: 20022
          username: ${{ secrets.SERVER_USER }}
          password: ${{ secrets.SERVER_PASSWORD }}
          script: |
            echo "SSH connection OK"
            powershell -Command "Write-Host 'PowerShell OK'"

      - name: Test .env write via SSH
        uses: appleboy/ssh-action@master
        with:
          host: ${{ secrets.SERVER_HOST }}
          port: 20022
          username: ${{ secrets.SERVER_USER }}
          password: ${{ secrets.SERVER_PASSWORD }}
          envs: OPENAI_API_KEY,ANTHROPIC_API_KEY
          script: |
            powershell -NoProfile -ExecutionPolicy Bypass -Command "
              Write-Host '=== ENV vars in SSH session ==='
              Write-Host \"OPENAI_API_KEY length: $($env:OPENAI_API_KEY.Length)\"
              Write-Host \"ANTHROPIC_API_KEY length: $($env:ANTHROPIC_API_KEY.Length)\"
              
              Write-Host '=== Writing test .env ==='
              $lines = @(
                'OPENAI_API_KEY=${{ secrets.OPENAI_API_KEY }}',
                'ANTHROPIC_API_KEY=${{ secrets.ANTHROPIC_API_KEY }}'
              )
              $utf8 = New-Object System.Text.UTF8Encoding `$False
              [System.IO.File]::WriteAllLines('C:\deploy\csautobot\test.env', `$lines, `$utf8)
              
              Write-Host '=== Reading test .env ==='
              Get-Content 'C:\deploy\csautobot\test.env' | ForEach-Object {
                `$parts = `$_ -split '=', 2
                Write-Host \"`$(`$parts[0]) length: `$(`$parts[1].Length)\"
              }
            "
        env:
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}

      - name: Check existing .env on server
        uses: appleboy/ssh-action@master
        with:
          host: ${{ secrets.SERVER_HOST }}
          port: 20022
          username: ${{ secrets.SERVER_USER }}
          password: ${{ secrets.SERVER_PASSWORD }}
          script: |
            powershell -NoProfile -Command "
              Write-Host '=== Check C:\deploy\csautobot\.env ==='
              if (Test-Path 'C:\deploy\csautobot\.env') {
                Get-Content 'C:\deploy\csautobot\.env' | ForEach-Object {
                  `$parts = `$_ -split '=', 2
                  Write-Host \"`$(`$parts[0]) length: `$(`$parts[1].Length)\"
                }
              } else {
                Write-Host '.env file does not exist'
              }
            "
