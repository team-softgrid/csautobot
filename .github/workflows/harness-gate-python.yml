name: Harness Gate (Python)

on:
  pull_request:
    branches: [main, develop]
  push:
    branches: [main, develop]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  python-harness:
    name: Python Harness
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: requirements.txt

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          # constraints.txt가 있으면 버전 핀 적용
          if [ -f constraints.txt ]; then
            pip install -r requirements.txt -c constraints.txt
          else
            pip install -r requirements.txt
          fi
          pip install pytest pytest-cov pytest-mock httpx

      # ── GATE: 실패 시 merge 차단 ──────────────────────────────
      - name: "[GATE] 단위·통합 테스트 (coverage ≥60%)"
        env:
          OPENAI_API_KEY: mock-openai-key-for-ci
          ANTHROPIC_API_KEY: mock-anthropic-key
          SECRET_KEY: ci-test-secret-key
        run: |
          pytest tests/ --ignore=tests/test_llm_quality.py -v --tb=short \
            --cov=. \
            --cov-report=term-missing \
            --cov-report=json:coverage.json \
            --cov-fail-under=60

      - name: "[GATE] API 키 하드코딩 탐지"
        run: |
          if grep -rn "sk-[a-zA-Z0-9]\{20,\}" . --include="*.py" | grep -v "test_\|conftest\|mock"; then
            echo "FAIL: Hardcoded API key found in source."; exit 1
          fi
          echo "PASS: No hardcoded API keys."

      - name: "[GATE] .env 파일 커밋 방지"
        run: |
          if git ls-files | grep -E "^\.env$|^\.env\.[a-z]"; then
            echo "FAIL: .env file is tracked by git."; exit 1
          fi
          echo "PASS: No .env files committed."

      # ── GATE: LLM 오프라인 품질 — 실패 시 merge 차단 ────────
      # 주의: || true 제거됨. 실패하면 CI 실패.
      # 온라인 LLM API가 필요한 테스트는 -k "Offline" 필터로 제외됨.
      - name: "[GATE] LLM 오프라인 품질 (DeepEval -k Offline)"
        if: hashFiles('tests/test_llm_quality.py') != ''
        env:
          OPENAI_API_KEY: mock-openai-key-for-ci
        run: |
          pip install "deepeval>=4.0.0,<5.0"
          pytest tests/test_llm_quality.py -v -k "Offline" --tb=short

      # ── REPORT: 참고용 — 실패해도 merge 차단 안 함 ───────────
      # 온라인 LLM 메트릭 (AnswerRelevancy 등)은 CI 환경에서 API 키 없이
      # 실행 불가. 로컬 또는 nightly 파이프라인에서 별도 실행 권장.
      - name: "[REPORT] LLM 온라인 품질 (DeepEval 전체 — 참고용)"
        if: hashFiles('tests/test_llm_quality.py') != ''
        env:
          OPENAI_API_KEY: mock-openai-key-for-ci
        run: |
          pytest tests/test_llm_quality.py -v --tb=short || true
          echo "INFO: 온라인 LLM 메트릭은 API 키 없이 skip됩니다. 결과는 참고용입니다."

      # ── GATE: Promptfoo 프롬프트 품질 ────────────────────────
      - name: "[GATE] Promptfoo 프롬프트 품질"
        if: hashFiles('promptfooconfig.yaml') != ''
        run: |
          npx --yes promptfoo@latest eval --config promptfooconfig.yaml --no-cache 2>&1 | tail -30

      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: coverage-report
          path: coverage.json
