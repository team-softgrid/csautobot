name: Harness Gate

on:
  pull_request:
    branches: [main]
  workflow_dispatch:

# PR merge를 차단하는 필수 게이트입니다.
# Branch protection → Required status checks에 "CSAutobot Harness" 추가 필요.

jobs:
  csautobot-harness:
    name: CSAutobot Harness
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: pip
          cache-dependency-path: requirements.txt

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          # 운영 의존성
          pip install -r requirements.txt || pip install -r requirements-mini.txt
          # 테스트 도구
          pip install pytest pytest-cov pytest-mock httpx

      - name: Run harness tests with coverage gate (≥60%)
        env:
          OPENAI_API_KEY: sk-mock-key-for-testing
          ANTHROPIC_API_KEY: mock-anthropic-key
          GOOGLE_API_KEY: mock-google-key
          SECRET_KEY: ci-test-secret-key
        run: |
          pytest tests/ -v --tb=short \
            --cov=csautobot \
            --cov-report=term-missing \
            --cov-report=json:coverage.json \
            --cov-fail-under=60

      - name: Safety: 민감정보 하드코딩 검사
        run: |
          echo "=== API 키 하드코딩 검사 ==="
          if grep -rn "sk-[a-zA-Z0-9]\{20,\}" csautobot/ --include="*.py"; then
            echo "FAIL: 실제 API 키가 소스코드에 하드코딩되어 있습니다."
            exit 1
          fi
          echo "PASS"

      - name: Upload coverage
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: coverage-report
          path: coverage.json
