name: Harness Gate

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  csautobot-harness:
    name: CSAutobot Harness
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: requirements.txt

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt || pip install -r requirements-mini.txt
          pip install pytest pytest-cov pytest-mock httpx

      - name: Run harness tests with coverage gate (60 percent)
        env:
          OPENAI_API_KEY: mock-openai-key-for-ci
          ANTHROPIC_API_KEY: mock-anthropic-key
          GOOGLE_API_KEY: mock-google-key
          SECRET_KEY: ci-test-secret-key
        run: |
          pytest tests/ -v --tb=short \
            --cov=csautobot \
            --cov-report=term-missing \
            --cov-report=json:coverage.json \
            --cov-fail-under=60

      - name: Safety check for hardcoded API keys
        run: |
          if grep -rn "sk-[a-zA-Z0-9]\{20,\}" csautobot/ --include="*.py"; then
            echo "FAIL: API key pattern found in source."
            exit 1
          fi
          echo "PASS"

      - name: Upload coverage
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: coverage-report
          path: coverage.json
