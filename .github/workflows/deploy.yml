name: Deploy csautobot to Remote Server

on:
  push:
    branches:
      - main

permissions:
  contents: write

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v3
        with:
          lfs: true

      - name: Setup Node.js
        uses: actions/setup-node@v3
        with:
          node-version: 20

      - name: Cache node modules
        id: cache-npm
        uses: actions/cache@v3
        with:
          path: frontend/node_modules
          key: ${{ runner.os }}-node-${{ hashFiles('**/package-lock.json') }}
          restore-keys: |
            ${{ runner.os }}-node-

      - name: Install Frontend Deps and Build
        run: |
          cd frontend
          if [ "${{ steps.cache-npm.outputs.cache-hit }}" != 'true' ]; then
            echo "Cache not found, running npm install"
            npm install --legacy-peer-deps
          fi
          npm run build
          rm -rf node_modules

      - name: Create Remote Directory
        uses: appleboy/ssh-action@master
        with:
          host: ${{ secrets.SERVER_HOST }}
          port: 20022
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SERVER_SSH_KEY }}
          script: |
            powershell -Command "New-Item -ItemType Directory -Force -Path 'C:\deploy\csautobot'"

      - name: Create .env file
        run: |
          cat << EOF > .env
          OPENAI_API_KEY=${{ secrets.OPENAI_API_KEY }}
          ANTHROPIC_API_KEY=${{ secrets.ANTHROPIC_API_KEY }}
          GOOGLE_API_KEY=${{ secrets.GOOGLE_API_KEY }}
          TAVILY_API_KEY=${{ secrets.TAVILY_API_KEY }}
          LANGSMITH_API_KEY=${{ secrets.LANGSMITH_API_KEY }}
          JWT_SECRET_KEY=${{ secrets.JWT_SECRET_KEY }}
          LANGSMITH_TRACING=true
          LANGSMITH_ENDPOINT=https://api.smith.langchain.com
          LANGSMITH_PROJECT=ragproject
          EOF

      - name: Stop csautobot services on Remote Server
        uses: appleboy/ssh-action@master
        with:
          host: ${{ secrets.SERVER_HOST }}
          port: 20022
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SERVER_SSH_KEY }}
          script: |
            powershell -Command "try { Stop-Process -Name excel -ErrorAction SilentlyContinue } catch {}; try { pm2 stop csautobot-backend csautobot-frontend -s } catch {}; try { pm2 delete csautobot-backend csautobot-frontend -s } catch {}; Start-Sleep -Seconds 3"

      - name: Copy files via SCP
        uses: appleboy/scp-action@master
        with:
          host: ${{ secrets.SERVER_HOST }}
          port: 20022
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SERVER_SSH_KEY }}
          source: "csautobot/,requirements-prod.txt,scripts/deploy-remote.ps1,ecosystem.config.js,.env,csautobot_initial.db,frontend/"
          target: "C:/deploy/csautobot"
          strip_components: 0

      - name: Execute PM2 Deploy Command on Remote Server
        uses: appleboy/ssh-action@master
        with:
          host: ${{ secrets.SERVER_HOST }}
          port: 20022
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SERVER_SSH_KEY }}
          command_timeout: 30m
          script: |
            powershell -NoProfile -ExecutionPolicy Bypass -Command "C:\deploy\csautobot\scripts\deploy-remote.ps1 > C:\deploy\csautobot\deploy_log.txt 2>&1"

      - name: Fetch Remote PM2 Logs and Push to Git
        if: always()
        run: |
          echo "${{ secrets.SERVER_SSH_KEY }}" > private_key && chmod 600 private_key
          SSH_COMMAND="ssh -o StrictHostKeyChecking=no -p 20022 -i private_key ${{ secrets.SERVER_USER }}@${{ secrets.SERVER_HOST }}"
          $SSH_COMMAND "cmd.exe /c set PM2_HOME=C:\\Users\\Administrator\\.pm2 && pm2 logs csautobot-backend --lines 100 --nostream" > pm2_logs.txt || true
          $SSH_COMMAND "cmd.exe /c set PM2_HOME=C:\\Users\\Administrator\\.pm2 && pm2 logs csautobot-frontend --lines 100 --nostream" > pm2_frontend_logs.txt || true
          $SSH_COMMAND "cmd.exe /c set PM2_HOME=C:\\Users\\Administrator\\.pm2 && pm2 status" > pm2_status.txt || true
          $SSH_COMMAND "powershell -Command \"echo '--- NETSTAT PORTS 5000/8000 ---'; netstat -ano | findstr ':5000 :8000'; echo '--- RUNNING PROCESSES ---'; Get-Process -Name node,python -ErrorAction SilentlyContinue | Format-Table Id,CPU,WorkingSet,ProcessName -AutoSize; echo '--- SCHEDULED TASKS (PM2) ---'; schtasks /query /fo LIST 2>&1 | findstr /i 'pm2'; echo '--- PM2 HOME STATUS ---'; if (Test-Path 'C:\\Users\\Administrator\\.pm2\\dump.pm2') { echo 'dump.pm2 EXISTS'; } else { echo 'dump.pm2 MISSING'; }\"" >> pm2_status.txt || true
          $SSH_COMMAND "cmd.exe /c type C:\\deploy\\csautobot\\deploy_log.txt" > deploy_log.txt || true
          
          git config --global user.name "deploy-bot"
          git config --global user.email "deploy-bot@softgrid.kr"
          git add pm2_logs.txt pm2_frontend_logs.txt pm2_status.txt deploy_log.txt || exit 0
          git commit -m "chore: update remote pm2 logs [skip ci]" || exit 0
          git push origin main || exit 0
