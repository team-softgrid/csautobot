name: Deploy csautobot to Remote Server

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v3
        with:
          lfs: true

      - name: Setup Node.js
        uses: actions/setup-node@v3
        with:
          node-version: 20

      - name: Install Frontend Deps and Build
        run: |
          cd frontend
          npm install --legacy-peer-deps
          npm run build
          rm -rf node_modules

      - name: Create Remote Directory
        uses: appleboy/ssh-action@master
        with:
          host: ${{ secrets.SERVER_HOST }}
          port: 20022
          username: ${{ secrets.SERVER_USER }}
          password: ${{ secrets.SERVER_PASSWORD }}
          script: |
            powershell -Command "New-Item -ItemType Directory -Force -Path 'C:\deploy\csautobot'"

      - name: Create .env file
        run: |
          cat << EOF > .env
          OPENAI_API_KEY=${{ secrets.OPENAI_API_KEY }}
          ANTHROPIC_API_KEY=${{ secrets.ANTHROPIC_API_KEY }}
          GOOGLE_API_KEY=${{ secrets.GOOGLE_API_KEY }}
          TAVILY_API_KEY=${{ secrets.TAVILY_API_KEY }}
          LANGSMITH_API_KEY=${{ secrets.LANGSMITH_API_KEY }}
          LANGSMITH_TRACING=true
          LANGSMITH_ENDPOINT=https://api.smith.langchain.com
          LANGSMITH_PROJECT=ragproject
          EOF

      - name: Copy files via SCP
        uses: appleboy/scp-action@master
        with:
          host: ${{ secrets.SERVER_HOST }}
          port: 20022
          username: ${{ secrets.SERVER_USER }}
          password: ${{ secrets.SERVER_PASSWORD }}
          source: "csautobot/,requirements-prod.txt,scripts/deploy-remote.ps1,ecosystem.config.js,.env,csautobot_initial.db,frontend/"
          target: "C:/deploy/csautobot"
          strip_components: 0

      - name: Execute PM2 Deploy Command on Remote Server
        uses: appleboy/ssh-action@master
        with:
          host: ${{ secrets.SERVER_HOST }}
          port: 20022
          username: ${{ secrets.SERVER_USER }}
          password: ${{ secrets.SERVER_PASSWORD }}
          command_timeout: 30m
          script: |
            powershell -NoProfile -ExecutionPolicy Bypass -File "C:\deploy\csautobot\scripts\deploy-remote.ps1"
