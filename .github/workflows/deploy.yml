name: Deploy csautobot to Remote Server

on:
  push:
    branches:
      - main

permissions:
  contents: write

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v3
        with:
          lfs: true

      - name: Setup Node.js
        uses: actions/setup-node@v3
        with:
          node-version: 20

      - name: Install Frontend Deps and Build
        run: |
          cd frontend
          npm install --legacy-peer-deps
          npm run build
          rm -rf node_modules

      - name: Create Remote Directory
        uses: appleboy/ssh-action@master
        with:
          host: ${{ secrets.SERVER_HOST }}
          port: 20022
          username: ${{ secrets.SERVER_USER }}
          password: ${{ secrets.SERVER_PASSWORD }}
          script: |
            powershell -Command "New-Item -ItemType Directory -Force -Path 'C:\deploy\csautobot'"

      - name: Create .env file
        run: |
          cat << EOF > .env
          OPENAI_API_KEY=${{ secrets.OPENAI_API_KEY }}
          ANTHROPIC_API_KEY=${{ secrets.ANTHROPIC_API_KEY }}
          GOOGLE_API_KEY=${{ secrets.GOOGLE_API_KEY }}
          TAVILY_API_KEY=${{ secrets.TAVILY_API_KEY }}
          LANGSMITH_API_KEY=${{ secrets.LANGSMITH_API_KEY }}
          LANGSMITH_TRACING=true
          LANGSMITH_ENDPOINT=https://api.smith.langchain.com
          LANGSMITH_PROJECT=ragproject
          EOF

      - name: Stop Backend and Kill Excel processes on Remote Server
        uses: appleboy/ssh-action@master
        with:
          host: ${{ secrets.SERVER_HOST }}
          port: 20022
          username: ${{ secrets.SERVER_USER }}
          password: ${{ secrets.SERVER_PASSWORD }}
          script: |
            powershell -Command "try { Stop-Process -Name excel -ErrorAction SilentlyContinue } catch {}; try { pm2 kill } catch {}; try { Stop-Process -Name python -ErrorAction SilentlyContinue } catch {}; try { Stop-Process -Name node -ErrorAction SilentlyContinue } catch {}; Start-Sleep -Seconds 5"

      - name: Copy files via SCP
        uses: appleboy/scp-action@master
        with:
          host: ${{ secrets.SERVER_HOST }}
          port: 20022
          username: ${{ secrets.SERVER_USER }}
          password: ${{ secrets.SERVER_PASSWORD }}
          source: "csautobot/,requirements-prod.txt,scripts/deploy-remote.ps1,ecosystem.config.js,.env,csautobot_initial.db,frontend/"
          target: "C:/deploy/csautobot"
          strip_components: 0

      - name: Execute PM2 Deploy Command on Remote Server
        uses: appleboy/ssh-action@master
        with:
          host: ${{ secrets.SERVER_HOST }}
          port: 20022
          username: ${{ secrets.SERVER_USER }}
          password: ${{ secrets.SERVER_PASSWORD }}
          command_timeout: 30m
          script: |
            powershell -NoProfile -ExecutionPolicy Bypass -Command "C:\deploy\csautobot\scripts\deploy-remote.ps1 > C:\deploy\csautobot\deploy_log.txt 2>&1"

      - name: Fetch Remote PM2 Logs and Push to Git
        if: always()
        run: |
          sudo apt-get update && sudo apt-get install -y sshpass
          sshpass -p "${{ secrets.SERVER_PASSWORD }}" ssh -o StrictHostKeyChecking=no -p 20022 ${{ secrets.SERVER_USER }}@${{ secrets.SERVER_HOST }} "cmd.exe /c pm2 --home C:\Users\Administrator\.pm2 logs csautobot-backend --lines 100 --nostream" > pm2_logs.txt
          sshpass -p "${{ secrets.SERVER_PASSWORD }}" ssh -o StrictHostKeyChecking=no -p 20022 ${{ secrets.SERVER_USER }}@${{ secrets.SERVER_HOST }} "cmd.exe /c pm2 --home C:\Users\Administrator\.pm2 logs csautobot-frontend --lines 100 --nostream" > pm2_frontend_logs.txt
          sshpass -p "${{ secrets.SERVER_PASSWORD }}" ssh -o StrictHostKeyChecking=no -p 20022 ${{ secrets.SERVER_USER }}@${{ secrets.SERVER_HOST }} "cmd.exe /c pm2 --home C:\Users\Administrator\.pm2 status" > pm2_status.txt
          sshpass -p "${{ secrets.SERVER_PASSWORD }}" ssh -o StrictHostKeyChecking=no -p 20022 ${{ secrets.SERVER_USER }}@${{ secrets.SERVER_HOST }} "powershell -Command \"echo '--- NETSTAT PORTS 5000/8000 ---'; netstat -ano | findstr ':5000 :8000'; echo '--- RUNNING PROCESSES ---'; Get-Process -Name node,python -ErrorAction SilentlyContinue | Format-Table Id,CPU,WorkingSet,ProcessName -AutoSize; echo '--- SCHEDULED TASKS (PM2) ---'; schtasks /query /fo LIST 2>&1 | findstr /i 'pm2'; echo '--- PM2 HOME STATUS ---'; if (Test-Path 'C:\Users\Administrator\.pm2\dump.pm2') { echo 'dump.pm2 EXISTS'; } else { echo 'dump.pm2 MISSING'; }\"" >> pm2_status.txt
          sshpass -p "${{ secrets.SERVER_PASSWORD }}" ssh -o StrictHostKeyChecking=no -p 20022 ${{ secrets.SERVER_USER }}@${{ secrets.SERVER_HOST }} "cmd.exe /c type C:\deploy\csautobot\deploy_log.txt" > deploy_log.txt
          
          git config --global user.name "deploy-bot"
          git config --global user.email "deploy-bot@softgrid.kr"
          git add pm2_logs.txt pm2_frontend_logs.txt pm2_status.txt deploy_log.txt || exit 0
          git commit -m "chore: update remote pm2 logs [skip ci]" || exit 0
          git push origin main || exit 0
