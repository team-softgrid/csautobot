name: Deploy csautobot to Remote Server
on:
  push:
    branches:
      - main
jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - name: Check Status
        uses: appleboy/ssh-action@master
        with:
          host: ${{ secrets.SERVER_HOST }}
          port: 20022
          username: ${{ secrets.SERVER_USER }}
          password: ${{ secrets.SERVER_PASSWORD }}
          script: |
            powershell -Command "Get-Process python -EA SilentlyContinue"
            powershell -Command "Get-ChildItem C:\deploy\csautobot\deploy_log_*.txt | Sort-Object LastWriteTime -Descending | Select-Object -First 1 | Get-Content -Tail 50 -EA SilentlyContinue"

