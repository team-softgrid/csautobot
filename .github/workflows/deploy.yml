name: Deploy csautobot to Remote Server
on:
  push:
    branches:
      - main
jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - name: Check Status
        uses: appleboy/ssh-action@master
        with:
          host: ${{ secrets.SERVER_HOST }}
          port: 20022
          username: ${{ secrets.SERVER_USER }}
          password: ${{ secrets.SERVER_PASSWORD }}
          script: |
            powershell -Command "Copy-Item C:\deploy\csautobot\deploy_log_*.txt C:\tmp\log_copy.txt -Force -EA SilentlyContinue"
            powershell -Command "Get-Content C:\tmp\log_copy.txt -Tail 50 -EA SilentlyContinue"

