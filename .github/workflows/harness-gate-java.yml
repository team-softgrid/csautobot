name: Harness Gate (Java/Spring)

on:
  pull_request:
    branches: [main, develop]
  push:
    branches: [main, develop]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  java-harness:
    name: Java Harness
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          java-version: "17"
          distribution: temurin
          cache: maven

      - name: Run harness unit tests (no DB)
        run: |
          ./mvnw test \
            -Dtest="*HarnessTest,*InvariantTest,*PaddingTest" \
            -Dsurefire.failIfNoSpecifiedTests=false \
            --batch-mode --no-transfer-progress

      - name: Build check
        run: ./mvnw clean package -DskipTests --batch-mode --no-transfer-progress
